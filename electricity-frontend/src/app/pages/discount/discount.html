<ng-template #infoDialog let-dialogRef="dialogRef">
  <div class="dialog-box">
    <div class="dialog-header">
      <mat-icon (click)="dialog.closeAll()">close</mat-icon>
    </div>
    <div class="dialog-content" [innerHTML]="currentDialogText">
    </div>
  </div>
</ng-template>


<div class="container-discount">
  <div class="container-partner">
    <div class="icon-circle ">
      <span class="item-image">
        <img src="assets/icons/Haken.png" class="icon-check" alt="check">
      </span>
    </div>
    <div class="expert">Dauerhaft fester Ansprechpartner
      <div class="info-container" (click)="openInfo(infoDialog, ansprechpartner)">
        <mat-icon class="info-icon-discount">info_i</mat-icon>
      </div>
    </div>
  </div>
  <div class="container-partner">
    <div class="icon">
      <span class="item-image">
        <img src="assets/icons/Haken.png" class="icon-check" alt="check">
      </span>
    </div>
    <div class="expert">Über 90 Anbieter im Vergleich
    </div>
  </div>
  <div class="container-partner">
    <div class="icon">
      <span class="item-image">
        <img src="assets/icons/Haken.png" class="icon-check" alt="check">
      </span>
    </div>
    <div class="expert">Automatische Wechselerinnerung
      <div class="info-container" (click)="openInfo(infoDialog, wechselerinnerung)">
        <mat-icon class="info-icon-discount">info_i</mat-icon>
      </div>
    </div>
  </div>
</div>
