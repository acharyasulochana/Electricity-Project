<div class="max-w-2xl mx-auto bg-white dark:bg-gray-900 p-6 rounded-2xl shadow">

    <h2 class="text-xl font-semibold text-gray-800 dark:text-white mb-6">
        Über uns bearbeiten
    </h2>

    <form (ngSubmit)="onSubmit()" class="space-y-6">

        <div>
            <label class="block text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">
                Hintergrundbild / Foto *
            </label>

            <div
                class="border-2 border-dashed rounded-lg p-4 text-center cursor-pointer hover:border-brand-400 transition">
                <input type="file" accept="image/*" (change)="onFileChange($event)" class="hidden" #fileInput />

                <div (click)="fileInput.click()" class="cursor-pointer">
                    @if (!imagePreview) {
                    <p class="text-sm text-gray-500">
                        Klicken Sie hier, um ein Bild hochzuladen
                    </p>
                    }

                    @if (imagePreview) {
                    <img [src]="imagePreview" class="mx-auto max-h-48 object-cover rounded-lg shadow-sm" />
                    <p class="text-xs mt-2 text-gray-500">Zum Ändern klicken</p>
                    }
                </div>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">
                Beschreibung *
            </label>
            <textarea [(ngModel)]="description" name="description" rows="8"
                placeholder="Schreiben Sie hier etwas über Ihr Unternehmen..."
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-brand-500 dark:bg-gray-800 dark:border-gray-700 outline-none resize-none">
      </textarea>
        </div>

        @if (errorMessage) {
        <p class="text-sm text-red-500">
            {{ errorMessage }}
        </p>
        }

        <button type="submit" [disabled]="isLoading"
            class="w-full bg-brand-500 text-white py-3 rounded-lg hover:bg-brand-600 transition cursor-pointer disabled:opacity-50 font-medium">
            {{ isLoading ? 'Wird gespeichert...' : 'Änderungen speichern' }}
        </button>

    </form>
</div>
